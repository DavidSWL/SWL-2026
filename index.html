<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SWL Hub — Southwest Landscape</title>

  <!-- ============================================================
       LOGO & FAVICON — Replace with your company logo
       
       Option A: Use a URL to your logo image:
         Set LOGO_URL below to your image URL
         e.g. "https://yourcompany.com/logo.png"
       
       Option B: Upload logo.png to your GitHub repo and set:
         LOGO_URL = "./logo.png"
       
       FAVICON: Set FAVICON_URL to your favicon URL or use same logo
  ============================================================ -->
  <script>
    window.LOGO_URL = "";        // ← Paste your logo URL here (leave "" to use leaf)
    window.FAVICON_URL = "";     // ← Paste your favicon URL here (leave "" for default)
    window.COMPANY_NAME = "Southwest Landscape Inc.";
  </script>

  <!-- Dynamic favicon -->
  <link id="swl-favicon" rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%231c3a2a'/><text y='.9em' font-size='80' x='10'>🌿</text></svg>">

  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#1c3a2a}
    #root{min-height:100vh}
    .swl-logo{height:32px;width:auto;object-fit:contain;border-radius:4px}
  </style>
  <script>
    // Apply favicon if custom URL set
    if(window.FAVICON_URL){
      document.getElementById("swl-favicon").href = window.FAVICON_URL;
      document.getElementById("swl-favicon").type = "image/png";
    }
    if(window.LOGO_URL){
      document.title = (window.COMPANY_NAME||"SWL Hub") + " — HR Portal";
    }
  </script>
</head>
<body>
<div id="root"></div>

<script>
// ── Storage engine ──────────────────────────────────────────────
var _cache  = null;
var _fbDb   = null;
var _fbDone = false;          // true once Firebase attempt finished
var _fbWait = [];             // callbacks waiting for Firebase

function _onFbReady(fn) {
  if (_fbDone) { fn(); } else { _fbWait.push(fn); }
}
function _fbResolve() {
  _fbDone = true;
  _fbWait.forEach(function(fn){ fn(); });
  _fbWait = [];
}

window._swlLoad = async function(key) {
  if (_cache !== null) {
    return _cache[key] !== undefined ? _cache[key] : null;
  }

  // Wait up to 6 s for Firebase before falling back
  await new Promise(function(resolve) {
    var t = setTimeout(function(){ _fbResolve(); resolve(); }, 6000);
    _onFbReady(function(){ clearTimeout(t); resolve(); });
  });

  if (_fbDb) {
    try {
      var snap = await _fbDb.ref("swlhub").get();
      _cache = (snap && snap.exists()) ? (snap.val() || {}) : {};
    } catch(e) {
      console.warn("Firebase read:", e.message);
      _cache = {};
    }
  } else {
    _cache = {};
  }

  return _cache[key] !== undefined ? _cache[key] : null;
};

window._swlStore = async function(key, val) {
  if (!_cache) _cache = {};
  _cache[key] = val;
  if (_fbDb) {
    try { _fbDb.ref("swlhub/" + key).set(val); } catch(e) {}
  }
  try { localStorage.setItem("swlhub_" + key, JSON.stringify(val)); } catch(e) {}
};

// ── Load Firebase then resolve the wait ─────────────────────────
function _loadScript(src, cb) {
  var s = document.createElement('script');
  s.src = src;
  s.onload = cb;
  s.onerror = function(){ console.warn("Failed:", src); cb(); };
  document.head.appendChild(s);
}

_loadScript('https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js', function() {
  _loadScript('https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js', function() {
    _loadScript('https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js', function() {
      try {
        firebase.initializeApp({
          apiKey: "AIzaSyCxsFNt8uSexMNLA0efA5Zg9dfxyKUgdog",
          authDomain: "swl-hub-1dacd.firebaseapp.com",
          databaseURL: "https://swl-hub-1dacd-default-rtdb.firebaseio.com",
          projectId: "swl-hub-1dacd",
          storageBucket: "swl-hub-1dacd.firebasestorage.app",
          messagingSenderId: "557559511804",
          appId: "1:557559511804:web:56f47827acecbd189e3579"
        });
        _fbDb = firebase.database();
        window._fbDb = _fbDb;
        console.log("Firebase connected ✅");
      } catch(e) {
        console.warn("Firebase init failed:", e.message);
      }
      _fbResolve(); // tell the app Firebase is ready (or failed)
    });
  });
});
</script>
