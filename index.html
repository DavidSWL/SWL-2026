<!DOCTYPE html>
<html>
<head>
  <title>Microsoft Login Dashboard</title>
  <script src="https://alcdn.msauth.net/browser/2.38.3/js/msal-browser.min.js"></script>
</head>

<body style="font-family: Arial; padding: 20px;">

  <h2>Dashboard</h2>

  <button onclick="signIn()">Sign in with Microsoft</button>
  <button onclick="signOut()">Sign out</button>

  <p id="status">Not signed in</p>

  <hr>

  <input id="noteInput" placeholder="Type note..." />
  <button onclick="saveLocal()">Save Note</button>

  <script>
    // 🔴 PUT YOUR CLIENT ID HERE
    const msalConfig = {
      auth: {
        clientId: "YOUR_CLIENT_ID_HERE",
        authority: "https://login.microsoftonline.com/common",
        redirectUri: window.location.origin
      }
    };

    const msalInstance = new msal.PublicClientApplication(msalConfig);

    let account = null;

    async function signIn() {
      try {
        const login = await msalInstance.loginPopup({
          scopes: ["User.Read"]
        });

        account = login.account;
        document.getElementById("status").innerText =
          "Signed in as: " + account.username;

      } catch (err) {
        console.error(err);
      }
    }

    function signOut() {
      msalInstance.logoutPopup();
      account = null;
      document.getElementById("status").innerText = "Signed out";
    }

    function saveLocal() {
      const val = document.getElementById("noteInput").value;
      localStorage.setItem("note", val);
      alert("Saved locally");
    }

    window.onload = async () => {
      const accounts = msalInstance.getAllAccounts();
      if (accounts.length > 0) {
        account = accounts[0];
        document.getElementById("status").innerText =
          "Signed in as: " + account.username;
      }
    };
  </script>

</body>
</html>
