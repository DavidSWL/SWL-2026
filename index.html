<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; background:#1c3a2a; }
    #root { min-height:100vh; }
  </style>
</head>
<body>
<div id="root">
  <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;">
    <div style="text-align:center;color:#fff;">
      <div style="font-size:52px;margin-bottom:14px">🌿</div>
      <p style="font-size:16px;font-weight:600">Loading SWL Hub...</p>
    </div>
  </div>
</div>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<script>
// ================================================================
//  SWL HUB SETUP — paste your Firebase config here (one time only)
//  Get it from: Firebase Console → Project Settings → Your Apps
// ================================================================
var firebaseConfig = {
 apiKey: "AIzaSyCxsFNt8uSexMNLA0efA5Zg9dfxyKUgdog",
  authDomain: "swl-hub-1dacd.firebaseapp.com",
  databaseURL: "https://swl-hub-1dacd-default-rtdb.firebaseio.com",
  projectId: "swl-hub-1dacd",
  storageBucket: "swl-hub-1dacd.firebasestorage.app",
  messagingSenderId: "557559511804",
  appId: "1:557559511804:web:56f47827acecbd189e3579",
  measurementId: "G-2BGF03RRQ1"
};
// ================================================================

try {
  firebase.initializeApp(firebaseConfig);
  var _db = firebase.database();

  // Storage: all data lives at /swlhub/ in your Firebase database
  var _cache = {};
  var _loaded = false;

  window._swlLoad = async function(key) {
    if (!_loaded) {
      try {
        var snap = await _db.ref("swlhub").get();
        _cache = snap.exists() ? (snap.val() || {}) : {};
      } catch(e) { _cache = {}; }
      _loaded = true;
    }
    return _cache[key] !== undefined ? _cache[key] : null;
  };

  window._swlStore = async function(key, val) {
    _cache[key] = val;
    try { await _db.ref("swlhub/" + key).set(val); } catch(e) { console.error("Save error:", e); }
  };

  console.log("SWL Hub: Firebase connected ✅");
} catch(e) {
  console.error("Firebase error:", e.message);
  // Fallback: localStorage so app still works locally
  window._swlLoad  = async (key) => { try { var v=localStorage.getItem("swlhub_"+key); return v?JSON.parse(v):null; } catch{ return null; } };
  window._swlStore = async (key, val) => { try { localStorage.setItem("swlhub_"+key, JSON.stringify(val)); } catch(e){} };
}
</script>
