<head>

  <title>SWL Hub — Southwest Landscape Inc.</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%231c3a2a'/><text y='.9em' font-size='80' x='10'>🌿</text></svg>">

    #root{min-height:100vh}
  </style>
</head>
<body>
<div id="root"></div>

<script>
// ── Storage engine ──────────────────────────────────────────────
var _cache  = null;
var _fbDb   = null;
var _fbDone = false;          // true once Firebase attempt finished
var _fbWait = [];             // callbacks waiting for Firebase

function _onFbReady(fn) {
  if (_fbDone) { fn(); } else { _fbWait.push(fn); }
}
function _fbResolve() {
  _fbDone = true;
  _fbWait.forEach(function(fn){ fn(); });
  _fbWait = [];
}

// Firebase converts JS arrays to objects with numeric keys — convert back
function _ensureArray(val) {
  if (Array.isArray(val)) return val;
  if (val && typeof val === "object") {
    var keys = Object.keys(val);
    if (keys.length > 0 && keys.every(function(k){ return !isNaN(k); })) {
      return keys.sort(function(a,b){return Number(a)-Number(b);}).map(function(k){return val[k];});
    }
  }
  return val;
}

window._swlLoad = async function(key) {
  if (_cache !== null) {
    var v = _cache[key];
    return v !== undefined ? _ensureArray(v) : null;
  }

  // Wait up to 6 s for Firebase before falling back
  await new Promise(function(resolve) {
    var t = setTimeout(function(){ _fbResolve(); resolve(); }, 6000);
    _onFbReady(function(){ clearTimeout(t); resolve(); });
  });

  if (_fbDb) {
    try {
      var snap = await _fbDb.ref("swlhub").get();
      _cache = (snap && snap.exists()) ? (snap.val() || {}) : {};
    } catch(e) {
      console.warn("Firebase read:", e.message);
      _cache = {};
    }
  } else {
    _cache = {};
  }

  return _cache[key] !== undefined ? _cache[key] : null;
};

window._swlStore = async function(key, val) {
  if (!_cache) _cache = {};
  _cache[key] = val;
  if (_fbDb) {
    try {
      await _fbDb.ref("swlhub/" + key).set(val);
    } catch(e) {
      console.error("Firebase write failed for key:", key, e.message);
      if (typeof window !== "undefined") {
        alert("\u26A0\uFE0F Save failed \u2014 please check your internet connection and try again.\n\nIf this keeps happening, contact HR.\n\nError: " + e.message);
      }
    }
  }
  try { localStorage.setItem("swlhub_" + key, JSON.stringify(val)); } catch(e) {}
};

// ── Load Firebase then resolve the wait ─────────────────────────
function _loadScript(src, cb) {
  var s = document.createElement('script');
  s.src = src;
  s.onload = cb;
  s.onerror = function(){ console.warn("Failed:", src); cb(); };
  document.head.appendChild(s);
}

_loadScript('https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js', function() {
  _loadScript('https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js', function() {
    _loadScript('https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js', function() {
      try {
        firebase.initializeApp({
          apiKey: "AIzaSyCxsFNt8uSexMNLA0efA5Zg9dfxyKUgdog",
          authDomain: "swl-hub-1dacd.firebaseapp.com",
          databaseURL: "https://swl-hub-1dacd-default-rtdb.firebaseio.com",
          projectId: "swl-hub-1dacd",
          storageBucket: "swl-hub-1dacd.firebasestorage.app",
          messagingSenderId: "557559511804",
          appId: "1:557559511804:web:56f47827acecbd189e3579"
        });
        _fbDb = firebase.database();
        window._fbDb = _fbDb;
        console.log("Firebase connected ✅");
      } catch(e) {
        console.warn("Firebase init failed:", e.message);
      }
      _fbResolve(); // tell the app Firebase is ready (or failed)
    });
  });
});
</script>
