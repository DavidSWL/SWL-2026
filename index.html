<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f4f6f8;
    }

    header {
      background: #1f2937;
      color: white;
      padding: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .container {
      padding: 20px;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      margin-bottom: 15px;
    }

    button {
      padding: 8px 12px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      margin-left: 5px;
    }

    .primary {
      background: #2563eb;
      color: white;
    }

    .danger {
      background: #dc2626;
      color: white;
    }

    input {
      padding: 8px;
      width: 70%;
      margin-right: 10px;
    }
  </style>
</head>

<body>
<header>
  <h3>My Dashboard</h3>
  <div>
    <button class="primary" onclick="saveData()">Save</button>
    <button onclick="loadData()">Load</button>
    <button class="danger" onclick="clearData()">Reset</button>
  </div>
</header>

<div class="container">

  <div class="card">
    <h4>Notes</h4>
    <input id="noteInput" placeholder="Type something..." />
  </div>

  <div class="card">
    <h4>Status</h4>
    <p id="status">Not loaded</p>
  </div>

</div>

<script>
  // -------------------------
  // LOCAL STORAGE (PRIMARY)
  // -------------------------
  const STORAGE_KEY = "dashboard_data_v1";

  function saveData() {
    const data = {
      note: document.getElementById("noteInput").value,
      time: new Date().toISOString()
    };

    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    document.getElementById("status").innerText = "Saved locally at " + new Date().toLocaleTimeString();
  }

  function loadData() {
    const raw = localStorage.getItem(STORAGE_KEY);

    if (!raw) {
      document.getElementById("status").innerText = "No saved data found";
      return;
    }

    const data = JSON.parse(raw);
    document.getElementById("noteInput").value = data.note || "";
    document.getElementById("status").innerText = "Loaded from local storage";
  }

  function clearData() {
    localStorage.removeItem(STORAGE_KEY);
    document.getElementById("noteInput").value = "";
    document.getElementById("status").innerText = "Reset complete";
  }

  // Auto-load once per browser (prevents repeated re-sync issues)
  window.addEventListener("load", () => {
    loadData();
  });
</script>

</body>
</html>
