      <div style="font-size:52px;margin-bottom:14px">🌿</div>

<!-- ============================================================
     SWL HUB — SOUTHWEST LANDSCAPE INC.
     Setup: paste your 2 values below, save, upload to GitHub
     ============================================================ -->
<script>
  // ─────────────────────────────────────────────────────────────
  //  STEP 1:  Go to https://jsonbin.io → sign up free
  //           Create a Bin → copy your Bin ID and Master Key
  //  STEP 2:  Paste them below
  // ─────────────────────────────────────────────────────────────
  var JSONBIN_ID  = "YOUR_BIN_ID";    // e.g. "6650abc123..."
  var JSONBIN_KEY = "YOUR_MASTER_KEY"; // e.g. "$2a$10$..."
  // ─────────────────────────────────────────────────────────────

  // Storage engine — reads/writes all data as one JSON to JSONBin
  var _cache = null;
  var _dirty = false;
  var _saving = false;

  async function _fetchAll() {
    if (_cache) return _cache;
    if (JSONBIN_ID === "YOUR_BIN_ID") {
      _cache = {}; return _cache;
    }
    try {
      var r = await fetch("https://api.jsonbin.io/v3/b/" + JSONBIN_ID + "/latest", {
        headers: {"X-Master-Key": JSONBIN_KEY, "X-Bin-Meta": "false"}
      });
      var d = await r.json();
      _cache = d || {};
    } catch(e) { _cache = {}; }
    return _cache;
  }

  async function _pushAll() {
    if (JSONBIN_ID === "YOUR_BIN_ID") return;
    if (_saving) { _dirty = true; return; }
    _saving = true;
    try {
      await fetch("https://api.jsonbin.io/v3/b/" + JSONBIN_ID, {
        method: "PUT",
        headers: {"Content-Type":"application/json","X-Master-Key": JSONBIN_KEY},
        body: JSON.stringify(_cache)
      });
    } catch(e) {}
    _saving = false;
    if (_dirty) { _dirty = false; _pushAll(); }
  }

  window._swlStore = async function(key, val) {
    if (!_cache) await _fetchAll();
    _cache[key] = val;
    _pushAll(); // fire and forget — UI stays fast
  };

  window._swlLoad = async function(key) {
    var all = await _fetchAll();
    return all[key] !== undefined ? all[key] : null;
  };
</script>
