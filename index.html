// ─── CSV PARSING ──────────────────────────────────────────────────────────────
function parseCSV(text) {
  const lines = text.replace(/\r/g,"").split("\n");
  if (!lines.length) return [];
  const headers = lines[0].split(",").map(h => h.trim().replace(/^"|"$/g,""));
  return lines.slice(1).filter(l => l.trim()).map(line => {
    const vals = []; let cur = "", inQ = false;
    for (const ch of line) {
      if (ch === '"') { inQ = !inQ; }
      else if (ch === "," && !inQ) { vals.push(cur.trim()); cur = ""; }
      else { cur += ch; }
    }
    vals.push(cur.trim());
    const row = {};
    headers.forEach((h,i) => { row[h] = (vals[i] || "").replace(/^"|"$/g,"").trim(); });
    return row;
  });
}

function toDate(d) {
  d = (d||"").trim();
  if (!d || d.includes("1/0/1900")) return "";
  const p = d.split("/");
  if (p.length === 3) return `${p[2]}-${p[0].padStart(2,"0")}-${p[1].padStart(2,"0")}`;
  return "";
}

function guessDivision(title, branchRaw) {
  const t = (title||"").toLowerCase();
  const b = (branchRaw||"").toLowerCase();
  if (/manager|director|vp |office|client rep|sales|procurement|purchase|support specialist/.test(t)) return "Office / Admin";
  if (/tree/i.test(b) || /pruner|climber|aerial|groundsman/.test(t)) return "Tree";
  if (/enhancement/i.test(b) || /landscaper/.test(t)) return "Enhancement";
  if (/yard|mechanic/.test(t)) return "Yard";
  return "Maintenance";
}

function parseRoster(text) {
  const rows = parseCSV(text);
  const active = [], termed = [];
  rows.forEach(r => {
    const id = (r.EmployeeID||"").trim();
    if (!id) return;
    const status = (r.EmploymentStatus||"").trim().toUpperCase();
    const branchRaw = r.Branch || "";
    const branch = toBranch(branchRaw);
    const manager = toFullMgr(r.Manager||"");
    const title = (r["Title "] || r.Title || "").trim();
    const emp = {
      id, name:(r.EmployeeName||"").trim(), branch, manager, title,
      eeType:(r["EE Type"]||"Hourly").trim() || "Hourly",
      hireDate:toDate(r.DOH || r.HireDate || ""),
      birthday:"", division:guessDivision(title, branchRaw),
      isNewHire:false, active:true,
    };
    if (status === "ACTIVE") {
      active.push(emp);
    } else if (status.includes("TERM")) {
      termed.push({
        id, name:emp.name, branch, division:emp.division, manager, title,
        termDate:toDate(r.DOT||""), lastDay:toDate(r.DOT||""),
        reason:(r["Term Reason "]||r["Term Reason"]||"Voluntary Resignation").trim(),
        notes:"", addedAt:nowISO(),
      });
    }
  });
  return {active, termed};
}

function parseBalances(text) {
  const lines = text.replace(/\r/g,"").split("\n");
  let hi = 0;
  for (let i = 0; i < Math.min(6, lines.length); i++) {
    if (lines[i].includes("EmployeeID")) { hi = i; break; }
  }
  const rows = parseCSV(lines.slice(hi).join("\n"));
  const bals = {};
  rows.forEach(r => {
    const id = (r.EmployeeID||"").trim();
    if (!id || id === "EmployeeID") return;
    const n = v => { try { return Math.round(parseFloat(v||"0"))||0; } catch { return 0; } };
    bals[id] = {
      ve:n(r["Vacation Entitled"]), vu:n(r["Vacation Used"]),
      se:n(r["Sick Entitled"]), su:n(r["Sick Used"]),
    };
  });
  return bals;
}

function parseRequests(text) {
  const rows = parseCSV(text);
  return rows.filter(r => {
    const pp = (r["Pay Period "] || r["Pay Period"] || "").trim();
    return r.EmployeeID?.trim() && r.StartDate?.trim() && r.EmployeeName?.trim() && pp && pp !== "Cancelled";
  }).map((r, i) => {
    const pp = (r["Pay Period "] || r["Pay Period"] || "").trim();
    return {
      id:`s${String(i+1).padStart(4,"0")}`, entry:i+1,
      eeId:r.EmployeeID.trim(), eeName:r.EmployeeName.trim(),
      branch:toBranch(r.Branch||""), manager:toFullMgr(r.Manager||""),
      division:guessDivision(r.Title||"", r.Branch||""),
      type:(r.Type||"Vacation").trim()||"Vacation",
      startDate:toDate(r.StartDate), endDate:toDate(r.EndDate),
      hours:(r.HoursRequested||"8").trim()||"8",
      status:(r.Status||"Approved").trim()||"Approved",
      approver:(r.Approver||"").trim(), note:(r.Notes||"").trim(),

      empSig:"", mgrSig:"",
      balApplied:(r.Status||"").trim()==="Approved",
      submittedAt:"2026-01-01T00:00:00",
    };
  });
}

function printPayroll(reqs, pp) {
  const rows = [...reqs].filter(r => r.payPeriod === pp).sort((a,b) => a.eeId.localeCompare(b.eeId));

  const trs = rows.map(r => `<tr><td><strong>${r.eeId}</strong></td><td>${r.eeName}</td><td>${r.branch}</td><td>${r.manager}</td><td>${tBadge(r.type)}</td><td>${fd(r.startDate)}</td><td>${fd(r.endDate)}</td><td><strong>${r.hours}</strong></td><td>${r.note||"&mdash;"}</td><td>${sBadge(r.status)}</td></tr>`).join("");
  return mkPage("Payroll "+pp, `<h1>Southwest Landscape Inc. &bull; SWL Hub</h1><div class="sub">Payroll Report &bull; ${pp} &bull; ${rows.length} records &bull; Total: <strong>${total} hrs</strong></div><hr class="hr"/><table><thead><tr><th>EE ID</th><th>Name</th><th>Branch</th><th>Manager</th><th>Type</th><th>Start</th><th>End</th><th>Hrs</th><th>Notes</th><th>Status</th></tr></thead><tbody>${trs||"<tr><td colspan='10' style='text-align:center;padding:12px;color:#999'>No records</td></tr>"}</tbody></table><div style="text-align:right;font-weight:700;font-size:12px">Total: ${total} hrs</div>`);
}

function printBalances(emps, bals, branch, hidden) {
  const list = (branch === "All" ? emps : emps.filter(e => e.branch === branch)).filter(e => !hidden[e.id]);
  const branches = branch === "All" ? [...new Set(list.map(e => e.branch))].sort() : [branch];
  let sections = "";
  branches.forEach(br => {
    const be = list.filter(e => e.branch === br);
    if (!be.length) return;
    const trs = be.map(e => {
      const b = bals[e.id] || {ve:40,vu:0,se:40,su:0};
      const vOk = nhVacOk(e.hireDate);
      const se = e.isNewHire && e.hireDate ? nhSick(e.hireDate) : b.se;
      const vr = Math.max(0,(vOk?b.ve:0)-b.vu), sr = Math.max(0,se-b.su);
      return `<tr><td><strong>${e.id}</strong></td><td>${e.name}</td><td>${e.manager}</td><td style="text-align:center">${vOk?b.ve:"N/A"}</td><td style="text-align:center">${b.vu}</td><td style="text-align:center;color:${vr<8?"#c05a5a":"#4e7c5f"}"><strong>${vOk?vr:"N/A"}</strong></td><td style="text-align:center">${se}</td><td style="text-align:center">${b.su}</td><td style="text-align:center;color:${sr<8?"#c05a5a":"#4e7c5f"}"><strong>${sr}</strong></td></tr>`;
    }).join("");
    sections += `<div style="margin-bottom:16px"><div class="bh">Branch: ${br} &mdash; ${be.length} employees</div><table><thead><tr><th>EE ID</th><th>Name</th><th>Manager</th><th>Vac Ent.</th><th>Vac Used</th><th>Vac Rem.</th><th>Sick Ent.</th><th>Sick Used</th><th>Sick Rem.</th></tr></thead><tbody>${trs}</tbody></table></div>`;

}

function printCalendar(reqs, yr, mo) {
  const ml = new Date(yr,mo,1).toLocaleDateString("en-US",{month:"long",year:"numeric"});
  const fD = new Date(yr,mo,1).getDay(), dim = new Date(yr,mo+1,0).getDate();
  const cells = [];
  for (let i = 0; i < fD; i++) cells.push("");
  for (let d = 1; d <= dim; d++) cells.push(d);
  while (cells.length % 7) cells.push("");
  const tc = t => t==="Vacation"?"#4a8fa8":t==="Sick"?"#c05a5a":t==="Injury Pay"?"#4e7c5f":"#c8923a";
  const gd = d => { if(!d) return []; const ds = `${yr}-${String(mo+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`; return reqs.filter(r => r.status==="Approved"&&r.startDate<=ds&&r.endDate>=ds); };
  const dh = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"].map(d => `<div class="ch">${d}</div>`).join("");
  const ch = cells.map(d => { if(!d) return `<div class="cc" style="background:#f4f0e8"></div>`; const dr = gd(d); return `<div class="cc"><div style="font-size:8px;font-weight:700;color:#4a5568;margin-bottom:2px">${d}</div>${dr.slice(0,4).map(r=>`<div class="ce" style="background:${tc(r.type)}">${r.eeName.split(" ")[0]}</div>`).join("")}${dr.length>4?`<div style="font-size:7px;color:#718096">+${dr.length-4}</div>`:""}</div>`; }).join("");
  return mkPage("Calendar "+ml, `<h1>Southwest Landscape Inc. &bull; SWL Hub</h1><div class="sub">Team Calendar &mdash; ${ml}</div><hr class="hr"/><div class="cg">${dh}${ch}</div>`);
}

function printYOS(emps) {
  const now = new Date(), yr = now.getFullYear();
  const list = emps.filter(e => e.hireDate).map(e => {
    const hd = new Date(e.hireDate+"T12:00");
    let ann = new Date(yr, hd.getMonth(), hd.getDate());
    if (ann < now) ann = new Date(yr+1, hd.getMonth(), hd.getDate());
    return {...e, yrs:yearsOf(e.hireDate), dToAnn:Math.ceil((ann-now)/86400000), annLabel:fmtMD(ann.toISOString().slice(0,10))};
  }).sort((a,b) => a.dToAnn - b.dToAnn);
  const trs = list.map(e => `<tr><td><strong>${e.id}</strong></td><td>${e.name}</td><td>${e.branch}</td><td>${e.manager}</td><td>${fd(e.hireDate)}</td><td><strong style="color:${parseFloat(e.yrs)>=10?"#1c3a2a":parseFloat(e.yrs)>=5?"#4e7c5f":"#4a8fa8"}">${e.yrs} yrs</strong></td><td style="color:${e.dToAnn<=30?"#c8923a":"#4a5568"}">${e.dToAnn===0?"Today!":e.dToAnn+" days"}</td><td>${e.annLabel}</td></tr>`).join("");
  return mkPage("Years of Service", `<h1>Southwest Landscape Inc. &bull; SWL Hub</h1><div class="sub">Years of Service Report &bull; ${new Date().toLocaleDateString()} &bull; ${list.length} employees</div><hr class="hr"/><table><thead><tr><th>EE ID</th><th>Name</th><th>Branch</th><th>Manager</th><th>Hire Date</th><th>Years</th><th>Ann. In</th><th>Ann. Date</th></tr></thead><tbody>${trs}</tbody></table>`);
}

function SigPad({onSave}) {
  const ref = useRef(null);
  const drawing = useRef(false);
  const getPos = (e, canvas) => {
    const rect = canvas.getBoundingClientRect();
    const cx = e.touches ? e.touches[0].clientX : e.clientX;
    const cy = e.touches ? e.touches[0].clientY : e.clientY;
    return {x: cx - rect.left, y: cy - rect.top};
  };
  const start = e => { e.preventDefault(); drawing.current = true; const c = ref.current, ctx = c.getContext("2d"), p = getPos(e,c); ctx.beginPath(); ctx.moveTo(p.x,p.y); };
  const draw = e => { e.preventDefault(); if(!drawing.current) return; const c = ref.current, ctx = c.getContext("2d"), p = getPos(e,c); ctx.lineWidth=2; ctx.strokeStyle=T.forest; ctx.lineCap="round"; ctx.lineTo(p.x,p.y); ctx.stroke(); };
  const stop = () => { drawing.current = false; if(onSave) onSave(ref.current.toDataURL()); };
  const clear = () => { ref.current.getContext("2d").clearRect(0,0,400,80); if(onSave) onSave(""); };
  return (
    <div>
      <canvas ref={ref} width={400} height={80} style={{border:`2px solid ${T.mist}`,borderRadius:8,cursor:"crosshair",touchAction:"none",background:T.white,display:"block",width:"100%",maxWidth:400}} onMouseDown={start} onMouseMove={draw} onMouseUp={stop} onMouseLeave={stop} onTouchStart={start} onTouchMove={draw} onTouchEnd={stop}/>
      <button onClick={clear} style={{marginTop:4,padding:"3px 10px",borderRadius:6,border:`1px solid ${T.mist}`,background:T.white,cursor:"pointer",fontSize:10,color:T.slate}}>Clear</button>
    </div>
  );
}

// ─── IMPORT SCREEN ────────────────────────────────────────────────────────────
function ImportScreen({onImport, isReimport}) {
  const [files, setFiles] = useState({roster:null, balances:null, requests:null});
  const [status, setStatus] = useState("");
  const [busy, setBusy] = useState(false);

  const readFile = f => new Promise((res,rej) => { const r = new FileReader(); r.onload = e => res(e.target.result); r.onerror = rej; r.readAsText(f,"utf-8"); });

  const run = async () => {
    if (!files.roster || !files.requests) { setStatus("Please select both Roster and Requests files."); return; }
    setBusy(true);
    try {
      setStatus("Reading Roster...");
      const {active, termed} = parseRoster(await readFile(files.roster));
      setStatus(`Found ${active.length} active employees...`);
      let bals = {};
      if (files.balances) { setStatus("Reading Balances..."); bals = parseBalances(await readFile(files.balances)); }
      setStatus("Reading Requests...");
      const reqs = parseRequests(await readFile(files.requests));
      setStatus(`${reqs.length} requests imported. Saving...`);
      await onImport({employees:active, termed, balances:bals, requests:reqs});
    } catch(e) { setStatus("Error: " + e.message); setBusy(false); }
  };

  const FileCard = ({label, field, optional}) => (
    <div style={{background:files[field]?"#f0fdf4":T.light,borderRadius:10,padding:14,border:`2px solid ${files[field]?T.leaf:T.sand}`}}>
      <p style={{fontWeight:700,fontSize:12,color:T.forest,marginBottom:2}}>{label}{!optional&&<span style={{color:T.rose}}> *</span>}</p>
      <p style={{fontSize:10,color:T.gray,marginBottom:9}}>{files[field] ? `✓ ${files[field].name}` : optional ? "Optional" : "Required"}</p>
      <label style={{display:"inline-block",padding:"6px 16px",borderRadius:8,background:files[field]?T.leaf:T.sage,color:T.white,cursor:"pointer",fontWeight:700,fontSize:11}}>
        {files[field] ? "Change File" : "Choose CSV File"}
        <input type="file" accept=".csv" style={{display:"none"}} onChange={e => e.target.files[0] && setFiles(p => ({...p,[field]:e.target.files[0]}))}/>
      </label>
    </div>
  );

  return (
    <div style={{minHeight:"100vh",background:`linear-gradient(135deg,${T.forest} 0%,${T.pine} 50%,${T.sage} 100%)`,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{background:T.white,borderRadius:20,padding:32,maxWidth:460,width:"100%",boxShadow:"0 24px 80px rgba(0,0,0,0.35)"}}>
        <div style={{textAlign:"center",marginBottom:24}}>
          <div style={{fontSize:48,marginBottom:10}}>🌿</div>
          <h1 style={{fontWeight:900,color:T.forest,fontSize:24,margin:0}}>SWL Hub</h1>
          <p style={{color:T.gray,fontSize:13,marginTop:4}}>Southwest Landscape Inc. — HRIS</p>
          <div style={{background:T.light,borderRadius:10,padding:"10px 14px",marginTop:14,fontSize:11,color:T.slate,textAlign:"left",lineHeight:1.5}}>
            {isReimport ? "Upload new CSV exports to refresh your data. Settings and PINs will be preserved." : "Upload your HR Dashboard CSV exports to get started. This only needs to be done once — data saves automatically."}
          </div>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:16}}>
          <FileCard label="HR Dashboard Roster" field="roster"/>
          <FileCard label="HR Dashboard Balances" field="balances" optional/>
          <FileCard label="HR Dashboard Requests" field="requests"/>
        </div>
        {status && <p style={{fontSize:11,textAlign:"center",marginBottom:12,color:status.startsWith("Error")?T.rose:busy?T.sage:T.forest}}>{status}</p>}
        <PrimaryBtn onClick={run} disabled={busy||!files.roster||!files.requests} bg={T.forest} full>
          {busy ? "Importing..." : "Import Data and Launch SWL Hub"}
        </PrimaryBtn>
      </div>
    </div>
  );
}

                  )}
                </Fragment>
              );

          </tbody>
        </table>
      </div>
    </div>
  );
}

// ─── CALENDAR ─────────────────────────────────────────────────────────────────
function CalView({reqs, onPrint}) {
  const [month, setMonth] = useState(new Date(2026,4,1));
  const yr = month.getFullYear(), mo = month.getMonth();
  const fD = new Date(yr,mo,1).getDay(), dim = new Date(yr,mo+1,0).getDate();
  const cells = [];
  for (let i = 0; i < fD; i++) cells.push(null);
  for (let d = 1; d <= dim; d++) cells.push(d);
  const getDayReqs = d => {
    if (!d) return [];
    const ds = `${yr}-${String(mo+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    return reqs.filter(r => r.status==="Approved" && r.startDate<=ds && r.endDate>=ds);
  };
  return (
    <div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
        <button onClick={() => setMonth(new Date(yr,mo-1,1))} style={{padding:"7px 14px",borderRadius:8,border:`1px solid ${T.mist}`,background:T.white,cursor:"pointer",fontWeight:600}}>Prev</button>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <h3 style={{fontWeight:700,color:T.forest,fontSize:16,margin:0}}>{month.toLocaleDateString("en-US",{month:"long",year:"numeric"})}</h3>
          {onPrint && <button onClick={() => onPrint(printCalendar(reqs,yr,mo))} style={{padding:"7px 14px",borderRadius:8,border:`1px solid ${T.mist}`,background:T.white,cursor:"pointer",fontSize:12,color:T.slate}}>Print Month</button>}
        </div>
        <button onClick={() => setMonth(new Date(yr,mo+1,1))} style={{padding:"7px 14px",borderRadius:8,border:`1px solid ${T.mist}`,background:T.white,cursor:"pointer",fontWeight:600}}>Next</button>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:2}}>
        {["Sun","Mon","Tue","Wed","Thu","Fri","Sat"].map(d => <div key={d} style={{textAlign:"center",fontSize:10,fontWeight:700,color:T.slate,padding:"3px 0"}}>{d}</div>)}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2}}>
        {cells.map((d,i) => {
          const dr = getDayReqs(d);
          return (
            <div key={i} style={{minHeight:68,background:d?T.white:"transparent",border:`1px solid ${d?T.sand:"transparent"}`,borderRadius:5,padding:3}}>
              {d && <div style={{fontSize:10,color:T.slate,marginBottom:2,fontWeight:600}}>{d}</div>}
              {dr.slice(0,3).map(r => <div key={r.id} title={r.eeName} style={{fontSize:8,background:typeColor(r.type),color:T.white,borderRadius:3,padding:"1px 4px",marginBottom:1,overflow:"hidden",whiteSpace:"nowrap",textOverflow:"ellipsis"}}>{r.eeName.split(" ")[0]}</div>)}
              {dr.length > 3 && <div style={{fontSize:8,color:T.gray}}>+{dr.length-3}</div>}
            </div>
          );
        })}
      </div>
      <div style={{display:"flex",gap:10,marginTop:10,flexWrap:"wrap"}}>
        {LEAVE_TYPES.map(t => <div key={t} style={{display:"flex",alignItems:"center",gap:4,fontSize:10,color:T.slate}}><div style={{width:10,height:10,borderRadius:2,background:typeColor(t)}}></div>{t}</div>)}
      </div>
    </div>
  );
}

              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"12px 16px"}}>
                <div style={SF}><label style={SL}>Term Date *</label><input type="date" style={SI} value={empForm.termDate||""} onChange={e => ef("termDate",e.target.value)}/></div>
                <div style={SF}><label style={SL}>Last Day Worked</label><input type="date" style={SI} value={empForm.lastDay||""} onChange={e => ef("lastDay",e.target.value)}/></div>

              <div style={SF}><label style={SL}>Reason *</label><input style={SI} list="term-reasons" value={empForm.reason||"Voluntary Resignation"} onChange={e => ef("reason",e.target.value)} placeholder="Select or type reason..."/><datalist id="term-reasons">{TERM_REASONS.map(r => <option key={r} value={r}/>)}</datalist></div>
              <div style={SF}><label style={SL}>Notes</label><textarea style={{...SI,resize:"vertical"}} rows={3} value={empForm.notes||""} onChange={e => ef("notes",e.target.value)}/></div>
              <div style={{display:"flex",justifyContent:"flex-end",gap:10,paddingTop:8}}>
                <OutlineBtn onClick={() => setEmpModal(null)}>Cancel</OutlineBtn>
                <PrimaryBtn onClick={() => {if(empForm.termDate){onTerm({...empForm,reason:empForm.reason||"Voluntary Resignation",notes:empForm.notes||"",addedAt:nowISO()});setEmpModal(null);}}} disabled={!empForm.termDate} bg={T.rose}>Terminate Employee</PrimaryBtn>

      )}

      {balModal && (
        <Modal title={`Edit Balances: ${balModal.name}`} onClose={() => setBalModal(null)}>
          <p style={{fontSize:12,color:T.slate,marginBottom:14}}>{balModal.id} &bull; {balModal.branch}</p>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            {[["Vacation Entitled","ve"],["Vacation Used","vu"],["Sick Entitled","se"],["Sick Used","su"]].map(([lb,k]) => (
              <div key={k} style={SF}><label style={SL}>{lb}</label><input style={SI} type="number" min="0" value={balForm[k]} onChange={e => bf(k,e.target.value)}/></div>

          <div style={{background:T.light,borderRadius:9,padding:12,marginTop:12,fontSize:13}}>
            Vac Remaining: <strong style={{color:Math.max(0,balForm.ve-balForm.vu)<8?T.rose:T.leaf}}>{Math.max(0,balForm.ve-balForm.vu)} hrs</strong> &nbsp;&nbsp;
            Sick Remaining: <strong style={{color:Math.max(0,balForm.se-balForm.su)<8?T.rose:T.leaf}}>{Math.max(0,balForm.se-balForm.su)} hrs</strong>
          </div>
          <div style={{display:"flex",justifyContent:"flex-end",gap:10,paddingTop:14,marginTop:14,borderTop:`1px solid ${T.sand}`}}>
            <OutlineBtn onClick={() => setBalModal(null)}>Cancel</OutlineBtn>
            <PrimaryBtn onClick={() => {onEditBal(balModal.id,{...balForm});setBalModal(null);}}>Save Balances</PrimaryBtn>
          </div>

      )}

      {addTermModal && (
        <Modal title="Add Termination Record" onClose={() => setAddTermModal(false)}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"12px 16px"}}>
            <div style={SF}><label style={SL}>EE ID</label><input style={SI} value={termForm.id||""} onChange={e => tf("id",e.target.value)} placeholder="Optional"/></div>
            <div style={{...SF,gridColumn:"1/-1"}}><label style={SL}>Full Name *</label><input style={SI} value={termForm.name||""} onChange={e => tf("name",e.target.value)}/></div>
            <div style={SF}><label style={SL}>Branch</label><select style={SI} value={termForm.branch||"OC"} onChange={e => tf("branch",e.target.value)}>{(settings.branches||DEFAULT_SETTINGS.branches).map(b => <option key={b}>{b}</option>)}</select></div>
            <div style={SF}><label style={SL}>Manager</label><select style={SI} value={termForm.manager||MGRS[0].name} onChange={e => tf("manager",e.target.value)}>{MGRS.map(m => <option key={m.name}>{m.name}</option>)}</select></div>
            <div style={SF}><label style={SL}>Term Date *</label><input type="date" style={SI} value={termForm.termDate||""} onChange={e => tf("termDate",e.target.value)}/></div>
            <div style={SF}><label style={SL}>Last Day</label><input type="date" style={SI} value={termForm.lastDay||""} onChange={e => tf("lastDay",e.target.value)}/></div>
            <div style={{...SF,gridColumn:"1/-1"}}><label style={SL}>Reason *</label><input style={SI} list="term-reasons-2" value={termForm.reason||"Voluntary Resignation"} onChange={e => tf("reason",e.target.value)}/><datalist id="term-reasons-2">{TERM_REASONS.map(r => <option key={r} value={r}/>)}</datalist></div>
            <div style={{...SF,gridColumn:"1/-1"}}><label style={SL}>Notes</label><textarea style={{...SI,resize:"vertical"}} rows={2} value={termForm.notes||""} onChange={e => tf("notes",e.target.value)}/></div>
            <div style={{gridColumn:"1/-1",display:"flex",justifyContent:"flex-end",gap:10}}>
              <OutlineBtn onClick={() => setAddTermModal(false)}>Cancel</OutlineBtn>
              <PrimaryBtn onClick={() => {if(termForm.name&&termForm.termDate){onAddTermed({...termForm,addedAt:nowISO()});setAddTermModal(false);}}} disabled={!termForm.name||!termForm.termDate} bg={T.rose}>Add Record</PrimaryBtn>
            </div>
          </div>
        </Modal>
      )}

      {pv && <PrintView html={pv} onClose={() => setPv(null)}/>}
    </div>
  );
}

// ─── EMPLOYEE PORTAL ──────────────────────────────────────────────────────────
function EmpPortal({emp, balance, myReqs, onSubmit, onBack, settings}) {
  const [tab, setTab] = useState("requests");
  const [showForm, setShowForm] = useState(false);
  const [pv, setPv] = useState(null);
  const b = balance || {ve:40,vu:0,se:40,su:0};
  const vOk = nhVacOk(emp.hireDate);
  const se = emp.isNewHire && emp.hireDate ? nhSick(emp.hireDate) : b.se;
  const vr = Math.max(0,(vOk?b.ve:0)-b.vu), sr = Math.max(0,se-b.su);
  return (
    <div style={{minHeight:"100vh",background:T.light}}>
      <div style={{background:T.forest,padding:"0 18px",display:"flex",alignItems:"center",justifyContent:"space-between",height:52,position:"sticky",top:0,zIndex:100,boxShadow:"0 2px 8px rgba(0,0,0,0.2)"}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}><span style={{fontSize:20}}>🌿</span><div><div style={{color:T.white,fontWeight:800,fontSize:14}}>SWL Hub</div><div style={{color:T.mist,fontSize:10}}>{emp.name}</div></div></div>
        <button onClick={onBack} style={{padding:"7px 13px",borderRadius:9,border:"1.5px solid rgba(255,255,255,0.3)",background:"transparent",color:T.white,cursor:"pointer",fontSize:12}}>Exit</button>
      </div>
      <div style={{background:T.pine,display:"flex",gap:0}}>
        {[{id:"requests",l:"My Requests"},{id:"balances",l:"My Balances"}].map(t => (
          <button key={t.id} onClick={() => setTab(t.id)} style={{padding:"10px 16px",border:"none",background:tab===t.id?"rgba(255,255,255,0.14)":"transparent",color:tab===t.id?T.white:T.mist,cursor:"pointer",fontWeight:tab===t.id?700:500,fontSize:12,borderBottom:tab===t.id?`2px solid ${T.gold}`:"2px solid transparent"}}>{t.l}</button>
        ))}
      </div>
      <div style={{padding:18,maxWidth:860,margin:"0 auto"}}>
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:18}}>
          {[{l:"Vac Entitled",v:vOk?b.ve:"N/A",c:T.sky},{l:"Vac Used",v:b.vu,c:T.gray},{l:"Vac Remaining",v:vOk?vr:"Not yet",c:vr>0&&vOk?T.leaf:T.rose},{l:"Sick Remaining",v:sr,c:sr>0?T.leaf:T.rose}].map(({l,v,c}) => (
            <div key={l} style={{background:T.white,borderRadius:10,padding:"13px 15px",boxShadow:"0 1px 4px rgba(0,0,0,0.06)"}}><div style={{fontSize:20,fontWeight:800,color:c}}>{v}</div><div style={{fontSize:10,color:T.gray,textTransform:"uppercase",marginTop:2}}>{l}</div></div>
          ))}
        </div>
        {tab==="requests" && (
          <>
            <div style={{marginBottom:12,display:"flex",justifyContent:"flex-end"}}><PrimaryBtn onClick={() => setShowForm(true)}>+ Request Time Off</PrimaryBtn></div>
            <div style={{background:T.white,borderRadius:12,overflow:"hidden",boxShadow:"0 1px 4px rgba(0,0,0,0.06)"}}>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                <thead><tr style={{background:T.forest,color:T.white}}>{["Type","Start","End","Hours","Pay Period","Status","Approver",""].map(h => <th key={h} style={{padding:"9px 12px",textAlign:"left",fontSize:11}}>{h}</th>)}</tr></thead>
                <tbody>
                  {myReqs.length===0 && <tr><td colSpan={8} style={{textAlign:"center",padding:32,color:T.gray}}>No requests yet — click + Request Time Off to submit your first request</td></tr>}
                  {[...myReqs].reverse().map((r,i) => (
                    <tr key={r.id} style={{background:i%2===0?T.white:T.light}}>
                      <td style={{padding:"9px 12px"}}><span style={{background:typeColor(r.type),color:T.white,borderRadius:5,padding:"2px 8px",fontSize:10,fontWeight:700}}>{r.type}</span></td>
                      <td style={{padding:"9px 12px",whiteSpace:"nowrap"}}>{fmtDate(r.startDate)}</td>
                      <td style={{padding:"9px 12px",whiteSpace:"nowrap"}}>{fmtDate(r.endDate)}</td>
                      <td style={{padding:"9px 12px",textAlign:"center",fontWeight:700}}>{r.hours}</td>
                      <td style={{padding:"9px 12px",fontSize:10,color:T.gray}}>{r.payPeriod}</td>
                      <td style={{padding:"9px 12px"}}><span style={{background:statusColor(r.status),color:T.white,borderRadius:5,padding:"2px 8px",fontSize:10,fontWeight:700}}>{r.status}</span></td>
                      <td style={{padding:"9px 12px",color:T.gray,fontSize:11}}>{r.approver||"Pending"}</td>
                      <td style={{padding:"9px 12px"}}><button onClick={() => setPv(printDetail(r))} style={{padding:"3px 9px",borderRadius:5,border:`1px solid ${T.mist}`,background:T.white,cursor:"pointer",fontSize:11}}>Print</button></td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </>
        )}
        {tab==="balances" && (
          <div style={{background:T.white,borderRadius:12,padding:22,boxShadow:"0 1px 4px rgba(0,0,0,0.06)"}}>
            <h3 style={{fontWeight:700,color:T.forest,marginBottom:16,fontSize:16}}>{emp.name} — Balance Detail</h3>
            {emp.isNewHire && emp.hireDate && <div style={{background:T.cream,borderRadius:9,padding:12,marginBottom:16,fontSize:12,color:T.slate}}>{vOk?"Vacation eligible ✅":"Vacation available after 1 year of service"} &bull; Current sick entitlement: {se} hrs</div>}
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:14}}>
              <thead><tr style={{background:T.forest,color:T.white}}>{["Leave Type","Entitled","Used","Remaining"].map(h => <th key={h} style={{padding:"12px 16px",textAlign:"left"}}>{h}</th>)}</tr></thead>
              <tbody>
                {[["Vacation",vOk?b.ve:0,b.vu,vr,T.sky],["Sick",se,b.su,sr,T.rose]].map(([type,ent,used,rem,c]) => (
                  <tr key={type}>
                    <td style={{padding:"14px 16px"}}><span style={{background:c,color:T.white,borderRadius:7,padding:"4px 12px",fontWeight:700,fontSize:13}}>{type}</span></td>
                    <td style={{padding:"14px 16px",fontWeight:600}}>{ent} hrs</td>
                    <td style={{padding:"14px 16px"}}>{used} hrs</td>
                    <td style={{padding:"14px 16px"}}><strong style={{color:rem===0?T.rose:T.leaf,fontSize:18}}>{rem} hrs</strong></td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )}
      </div>
      {showForm && <RequestForm employees={[emp]} prefillId={emp.id} settings={settings} onSubmit={r => {onSubmit(r);setShowForm(false);}} onClose={() => setShowForm(false)}/>}
      {pv && <PrintView html={pv} onClose={() => setPv(null)}/>}
    </div>
  );
}

// ─── MANAGER PORTAL ───────────────────────────────────────────────────────────
function MgrPortal({mgr, employees, balances, requests, onAction, onBack}) {
  const [tab, setTab] = useState("approvals");
  const [actionM, setActionM] = useState(null);
  const [pv, setPv] = useState(null);

  const isMyReq = r => toFullMgr(r.manager)===mgr.name || r.manager===mgr.name;
  const teamEmps = employees.filter(e => e.active!==false && e.manager===mgr.name);
  const teamReqs = requests.filter(isMyReq);
  const pending = teamReqs.filter(r => r.status==="Pending");
  const newHires = teamEmps.filter(e => e.isNewHire && e.hireDate);
  const upcoming = newHires.map(e => ({...e, nhs:nhPhase(e.hireDate)})).filter(e => e.nhs && e.nhs.next>0 && e.nhs.next<=30);

  const TABS = [{id:"approvals",l:`Pending (${pending.length})`},{id:"calendar",l:"Calendar"},{id:"balances",l:"Team Balances"},{id:"newhires",l:`30/60/90 (${newHires.length})`},{id:"history",l:"History"}];

  return (
    <div style={{minHeight:"100vh",background:T.light}}>

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
function App() {
  const [screen, setScreen] = useState("loading");
  const [reimport, setReimport] = useState(false);
  const [activeEmp, setActiveEmp] = useState(null);
  const [activeMgr, setActiveMgr] = useState(null);
  const [employees, setEmployees] = useState([]);
  const [balances, setBalances] = useState({});
  const [requests, setRequests] = useState([]);
  const [termed, setTermed] = useState([]);
  const [nhc, setNhc] = useState({});
  const [settings, setSettings] = useState(DEFAULT_SETTINGS);

  useEffect(() => {
    (async () => {
      try {
        const [emps, bals, reqs, termd, nhcs, stgs] = await Promise.all([
          load(SK.emps), load(SK.bals), load(SK.reqs), load(SK.termed), load(SK.nhc), load(SK.settings),
        ]);
        if (emps && reqs) {
          setEmployees(emps);
          setBalances(bals || {});
          setRequests(reqs);
          setTermed(termd || []);
          setNhc(nhcs || {});
          setSettings(stgs || DEFAULT_SETTINGS);
          setScreen("home");
        } else {
          setScreen("import");
        }
      } catch(e) {
        setScreen("import");
      }
    })();
  }, []);

  const save = async (key, val, setter) => { setter(val); await store(key, val); };

  const handleImport = async ({employees:emps, termed:t, balances:b, requests:r}) => {
    await Promise.all([store(SK.emps,emps), store(SK.bals,b), store(SK.reqs,r), store(SK.termed,t)]);
    setEmployees(emps); setBalances(b); setRequests(r); setTermed(t);
    setReimport(false); setScreen("home");
  };

  const handleAction = async (reqId, action, sig, note, approver) => {
    const reqs = [...requests];
    const idx = reqs.findIndex(r => r.id === reqId);
    if (idx < 0) return;
    const r = reqs[idx];
    const newBal = {...balances};
    const b = {...(newBal[r.eeId] || {ve:40,vu:0,se:40,su:0})};
    if (r.balApplied && action !== "Approved") {
      if (r.type==="Vacation") b.vu = Math.max(0, b.vu - parseFloat(r.hours||0));
      if (r.type==="Sick") b.su = Math.max(0, b.su - parseFloat(r.hours||0));
      newBal[r.eeId] = b;
      reqs[idx] = {...reqs[idx], balApplied:false};
    }
    if (action==="Approved" && !reqs[idx].balApplied) {
      if (r.type==="Vacation") b.vu = (b.vu||0) + parseFloat(r.hours||0);
      if (r.type==="Sick") b.su = (b.su||0) + parseFloat(r.hours||0);
      newBal[r.eeId] = b;
      reqs[idx] = {...reqs[idx], balApplied:true};
    }
    reqs[idx] = {...reqs[idx], status:action, mgrSig:sig, note:note||r.note, approver};
    await save(SK.reqs, reqs, setRequests);
    await save(SK.bals, newBal, setBalances);
  };

  const handleAddEmp = async emp => {
    const list = [...employees, emp];
    await save(SK.emps, list, setEmployees);
    if (!balances[emp.id]) await save(SK.bals, {...balances,[emp.id]:{ve:0,vu:0,se:0,su:0}}, setBalances);
  };

  const handleTerm = async t => {
    await save(SK.emps, employees.map(e => e.id===t.id ? {...e,active:false} : e), setEmployees);
    await save(SK.termed, [...termed, t], setTermed);
  };

  // Loading screen
  if (screen==="loading") return (
    <div style={{minHeight:"100vh",background:T.forest,display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style={{textAlign:"center",color:T.white}}>
        <div style={{fontSize:52,marginBottom:16}}>🌿</div>
        <p style={{fontSize:16,fontWeight:600}}>Loading SWL Hub...</p>
      </div>
    </div>
  );

  // Import screen
  if (screen==="import" || reimport) return <ImportScreen onImport={handleImport} isReimport={reimport}/>;

  // Home
  if (screen==="home") return <HomeScreen onSelect={s => setScreen(s==="hr"?"hr_login":s==="employee"?"emp_login":"mgr_login")}/>;

  // Logins
  if (screen==="hr_login") return <HRLogin settings={settings} onAuth={() => setScreen("hr")} onBack={() => setScreen("home")}/>;
  if (screen==="emp_login") return <EmpLogin employees={employees} onAuth={e => {setActiveEmp(e);setScreen("emp");}} onBack={() => setScreen("home")}/>;
  if (screen==="mgr_login") return <MgrLogin settings={settings} onAuth={m => {setActiveMgr(m);setScreen("mgr");}} onBack={() => setScreen("home")}/>;

  // HR Portal
  if (screen==="hr") return (
    <HRPortal
      employees={employees} balances={balances} requests={requests} termed={termed} nhc={nhc} settings={settings}
      onAction={handleAction}
      onAddEmp={handleAddEmp}
      onEditEmp={async e => await save(SK.emps, employees.map(x => x.id===e.id?e:x), setEmployees)}
      onEditBal={async (id,b) => await save(SK.bals, {...balances,[id]:b}, setBalances)}
      onSubmitReq={async r => await save(SK.reqs, [...requests,r], setRequests)}
      onTerm={handleTerm}
      onAddTermed={async t => await save(SK.termed, [...termed,t], setTermed)}
      onNHCheck={async (eid,did,val) => { const n = {...nhc,[eid]:{...(nhc[eid]||{}),[did]:val}}; await save(SK.nhc,n,setNhc); }}
      onUpdateSettings={async s => await save(SK.settings,s,setSettings)}
      onRemoveTerm={async id => await save(SK.termed, termed.filter(t => t.id!==id&&t.name!==id), setTermed)}
      onReimport={() => setReimport(true)}
      onBack={() => setScreen("home")}
    />
  );

  // Employee Portal
  if (screen==="emp" && activeEmp) return (
    <EmpPortal
      emp={activeEmp} balance={balances[activeEmp.id]} myReqs={requests.filter(r => r.eeId===activeEmp.id)}
      settings={settings}
      onSubmit={async r => await save(SK.reqs, [...requests,r], setRequests)}
      onBack={() => {setActiveEmp(null);setScreen("home");}}
    />
  );

  // Manager Portal
  if (screen==="mgr" && activeMgr) return (
    <MgrPortal
      mgr={activeMgr} employees={employees} balances={balances} requests={requests}
      onAction={handleAction}
      onBack={() => {setActiveMgr(null);setScreen("home");}}
    />
  );

  return <HomeScreen onSelect={s => setScreen(s==="hr"?"hr_login":s==="employee"?"emp_login":"mgr_login")}/>;
}


    ReactDOM.createRoot(document.getElementById("root")).render(<App />);

  </script>
</body>
</html>
