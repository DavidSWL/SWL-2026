<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
</head>
<body style="font-family: Arial; padding:20px;">

  <h2>Dashboard</h2>

  <input id="noteInput" placeholder="Type note..." style="width:300px;padding:6px;" />
  <br><br>

  <button onclick="save()">Save</button>
  <button onclick="load()">Load</button>
  <button onclick="reset()">Reset</button>

  <p id="status"></p>

  <script>
    const KEY = "dashboard_v1";

    function save() {
      localStorage.setItem(KEY, document.getElementById("noteInput").value);
      document.getElementById("status").innerText = "Saved";
    }

    function load() {
      document.getElementById("noteInput").value = localStorage.getItem(KEY) || "";
      document.getElementById("status").innerText = "Loaded";
    }

    function reset() {
      localStorage.removeItem(KEY);
      document.getElementById("noteInput").value = "";
      document.getElementById("status").innerText = "Reset";
    }

    load();
  </script>

</body>
</html>
